version: 2.1

jobs:
  prepare:
    docker:
      - image: circleci/node:12.10.0
     working_directory: ~/annie
    steps:
      - checkout
      - attach_workspace:
          at: ~/annie
      - restore_cache:
          key: npm-dependencies-{{ checksum "package.json" }}
      - run:
          name: install dependencies
          command: npm install
      - save_cache:
      key: npm-dependencies-{{ checksum "package.json" }}
      paths:
        - ./node_modules
        - ~/.cache/npm
      - persist_to_workspace:
          root: .
          paths:
            - .

  eslint:
    docker:
      - image: circleci/node:12.10.0
      working_directory: ~/annie
    steps:
      - attach_workspace:
          at: ~/annie
      - run:
          name: ESLint
          command: npm run eslint

  stylelint:
    docker:
      - image: circleci/node:12.10.0
      working_directory: ~/annie
    steps:
      - attach_workspace:
          at: ~/annie
      - run:
          name: Prettier
          command: npm run prettier

workflows:
  version: 2
  validate:
    jobs:
      - prepare
      - eslint:
          requires:
            - prepare
      - stylelint:
          requires:
            - prepare
